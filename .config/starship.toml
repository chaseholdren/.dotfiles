"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ŅéČ](#9A348E)\
$os\
$username\
[Ņé░](bg:#DA627D fg:#9A348E)\
$directory\
[Ņé░](fg:#DA627D bg:#FCA17D)\
$git_branch\
$git_status\
[Ņé░](fg:#FCA17D bg:#86BBD8)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$mise\
$nim\
$rust\
$scala\
[Ņé░](fg:#86BBD8 bg:#06969A)\
