# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like ’äĀ  or disable this
# and use the os module below
[username]
show_always = true
style_user = "bg:#9A348E"
style_root = "bg:#9A348E"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:#9A348E"
disabled = true # Disabled by default

[directory]
style = "bg:#DA627D"
format = "[ $path ]($style)"
truncation_length = 50
truncation_symbol = "ŌĆ”/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "’Ćü "
"Pictures" = "’ĆŠ "
"home" = "’ĆĢ "
"chase" = "~ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ¾░łÖ’ä¬ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ¾░łÖ " = " ¾░łÖ’ä¬ "

# https://starship.rs/config/#hostname
[hostname]
ssh_only = false
format = '[$ssh_symbol](bold blue) on [$hostname](bold red) '
trim_at = '.companyname.com'
disabled = false

# https://starship.rs/config/#google-cloud-gcloud
[gcloud]
format = '[ $symbol$project($region) ]($style)'
style = "bg:#06969A"

[docker_context]
symbol = "’īł "
style = "bg:#06969A"
format = '[ $symbol $context ]($style)'

[git_branch]
symbol = "’Éś"
style = "bg:#FCA17D"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#FCA17D"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = "Ņś¦ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'
disabled = true

[gradle]
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'
disabled = true

[java]
symbol = "Ņē¢ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'
disabled = true

[nodejs]
symbol = "Ņ£ś"
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'
disabled = true

[bun]
symbol = "ŅØ»"
style = "bg:#86BBD8"
format = '[ $symbol ]($style)'

[mise]
style = "bg:#86BBD8"
healthy_symbol = ''
unhealthy_symbol = 'unhealthy'
format = '[ $symbol$health]($style)'
disabled = false

[rust]
symbol = "Ņ×©"
